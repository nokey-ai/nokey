version: 2

# byteness/keyring v1.9.0 (the Touch ID fork) pulls in
# github.com/1password/onepassword-sdk-go, whose `!cgo && (darwin || linux)`
# build tag deliberately breaks compilation — so darwin and linux builds
# must have CGO enabled. The release workflow runs on macos-latest so:
#   • darwin builds use native Apple clang (no osxcross needed)
#   • linux builds cross-compile via the messense/macos-cross-toolchains
#     brew tap (installed by the workflow before goreleaser runs)
#   • windows builds stay CGO-free — the SDK's windows-tagged file is
#     selected regardless of CGO, so pure-Go cross-compile works.
builds:
  - id: darwin
    main: .
    binary: nokey
    env:
      - CGO_ENABLED=1
    goos: [darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/nokey-ai/nokey/internal/version.Version={{.Version}}
      - -X github.com/nokey-ai/nokey/internal/version.Commit={{.ShortCommit}}
      - -X github.com/nokey-ai/nokey/internal/version.Date={{.Date}}
    hooks:
      post:
        - cmd: sh -c 'case "{{ .Target }}" in darwin_*) command -v codesign >/dev/null && codesign -s - "{{ .Path }}" && echo "Signed {{ .Target }} for Touch ID" || echo "codesign not available, skipping {{ .Target }}" ;; esac'
          output: true

  - id: linux-amd64
    main: .
    binary: nokey
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w
      - -X github.com/nokey-ai/nokey/internal/version.Version={{.Version}}
      - -X github.com/nokey-ai/nokey/internal/version.Commit={{.ShortCommit}}
      - -X github.com/nokey-ai/nokey/internal/version.Date={{.Date}}

  - id: linux-arm64
    main: .
    binary: nokey
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    goos: [linux]
    goarch: [arm64]
    ldflags:
      - -s -w
      - -X github.com/nokey-ai/nokey/internal/version.Version={{.Version}}
      - -X github.com/nokey-ai/nokey/internal/version.Commit={{.ShortCommit}}
      - -X github.com/nokey-ai/nokey/internal/version.Date={{.Date}}

  - id: windows
    main: .
    binary: nokey
    env:
      - CGO_ENABLED=0
    goos: [windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/nokey-ai/nokey/internal/version.Version={{.Version}}
      - -X github.com/nokey-ai/nokey/internal/version.Commit={{.ShortCommit}}
      - -X github.com/nokey-ai/nokey/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - repository:
      owner: nokey-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    binaries:
      - nokey
    homepage: https://github.com/nokey-ai/nokey
    description: "Zero-trust secret management for AI coding assistants"
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nokey"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
