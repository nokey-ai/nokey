name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  release:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # The indirect dependency on github.com/1password/onepassword-sdk-go
      # (pulled in via byteness/keyring's opdesktop.go) fails to cross-compile
      # darwin/linux without CGO. We build darwin natively with Apple clang
      # (no osxcross needed) and install real Linux cross-toolchains from
      # messense/macos-cross-toolchains so the Linux targets can also link
      # with CGO. Windows stays CGO-free.
      - name: Install Linux cross-toolchains
        run: |
          brew tap messense/macos-cross-toolchains
          brew install x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu

      - name: Generate tap token
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: nokey-ai
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
