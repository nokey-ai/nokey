name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate tap token
        id: tap-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: nokey-ai
          repositories: homebrew-tap

      # The indirect dependency on github.com/1password/onepassword-sdk-go
      # (pulled in via byteness/keyring's opdesktop.go) fails to cross-compile
      # for darwin/linux without CGO — its !cgo build tag file emits a
      # deliberate undefined-symbol error. Running GoReleaser inside the
      # goreleaser-cross image gives us the native CGO toolchains for each
      # target OS/arch, which `.goreleaser.yaml` references via per-build
      # CC env vars.
      - name: Run GoReleaser via goreleaser-cross
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/go/src/github.com/nokey-ai/nokey" \
            -w /go/src/github.com/nokey-ai/nokey \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_TOKEN \
            --entrypoint /bin/bash \
            ghcr.io/goreleaser/goreleaser-cross:v1.26.0 \
            -c 'git config --global --add safe.directory /go/src/github.com/nokey-ai/nokey && goreleaser release --clean'
